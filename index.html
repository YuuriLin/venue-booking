<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="板橋、三重、林口、樹林、新莊 羽球場地即時租借查詢">
    <title>場地租借查詢</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 50%, #334155 100%);
            min-height: 100vh; 
            color: #e2e8f0;
        }
        .app { 
            max-width: 640px; 
            margin: 0 auto; 
            background: rgba(15, 23, 42, 0.95); 
            min-height: 100vh; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .topbar { 
            background: rgba(15, 23, 42, 0.98); 
            padding: 16px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 99; 
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        }
        .topbar-title { 
            font-size: 19px; 
            font-weight: 700; 
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-btn { 
            padding: 8px 18px; 
            border-radius: 9999px; 
            font-size: 13px; 
            font-weight: 600; 
            cursor: pointer; 
            background: rgba(59, 130, 246, 0.9); 
            color: white; 
            border: none;
        }

        .login-panel, .admin-banner { 
            margin: 16px; 
            padding: 18px; 
            border-radius: 16px; 
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .venue-tabs { 
            display: flex; 
            overflow-x: auto; 
            padding: 12px 12px 8px; 
            gap: 8px; 
            background: rgba(15, 23, 42, 0.95);
            scrollbar-width: none;
        }
        .venue-tab { 
            padding: 10px 18px; 
            font-size: 14px; 
            white-space: nowrap; 
            cursor: pointer; 
            background: rgba(51, 65, 85, 0.7); 
            border: none; 
            border-radius: 12px; 
            color: #cbd5e1; 
            transition: all 0.2s;
        }
        .venue-tab.active { 
            background: #3b82f6; 
            color: white; 
            font-weight: 600; 
        }

        .venue-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .badge { 
            display: inline-flex; align-items: center; gap: 6px; 
            font-size: 13px; padding: 6px 14px; 
            border-radius: 9999px; font-weight: 500; margin: 4px 4px 4px 0;
        }

        .day-tabs { 
            display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; 
        }
        .day-tab { 
            padding: 9px 16px; border-radius: 12px; font-size: 14px; 
            background: rgba(51, 65, 85, 0.6); border: none; color: #e2e8f0;
            white-space: nowrap; cursor: pointer; transition: all 0.2s;
        }
        .day-tab.active { background: #3b82f6; color: white; font-weight: 600; }

        .stats { display: flex; gap: 10px; padding: 0 16px 16px; }
        .stat { 
            flex: 1; padding: 14px; border-radius: 16px; 
            text-align: center; background: rgba(30, 41, 59, 0.8);
        }
        .stat-num { font-size: 28px; font-weight: 800; }

        .slots { padding: 0 16px 30px; display: flex; flex-direction: column; gap: 14px; }

        .slot-card { 
            background: rgba(30, 41, 59, 0.85); 
            border: 1px solid rgba(148, 163, 184, 0.2); 
            border-radius: 16px; 
            overflow: hidden; 
            transition: all 0.3s ease;
        }
        .slot-card.s-booked { 
            background: rgba(15, 23, 42, 0.95); 
            border-color: #f87171; 
        }
        .slot-card.clickable:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4); 
        }

        .slot-main { 
            padding: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .slot-time { font-size: 17px; font-weight: 700; }

        .court-row { padding: 0 18px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .cpip { 
            width: 34px; height: 34px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 13px; font-weight: 700;
        }

        .court-editor { 
            padding: 16px; 
            background: rgba(249, 115, 22, 0.12); 
            border-top: 1px solid rgba(249, 115, 22, 0.3); 
        }
        .ce-btn { 
            padding: 9px 14px; margin: 4px 3px; border-radius: 10px; 
            font-size: 13.5px; cursor: pointer; background: rgba(51,65,85,0.9); color: white; border: none;
        }

        .footer { 
            padding: 30px 16px 40px; 
            text-align: center; 
            color: #94a3b8; 
            font-size: 13.5px; 
        }
    </style>
</head>
<body>
<div class="app">

    <div class="topbar">
        <div>
            <div class="topbar-title">🏸 場地租借查詢</div>
            <div style="font-size:13px;color:#94a3b8;">即時查看可租時段</div>
        </div>
        <button class="admin-btn" id="adminBtn" onclick="handleAdminBtn()">管理員</button>
    </div>

    <div class="login-panel" id="loginPanel" style="display:none">
        <div style="font-weight:600;margin-bottom:12px;color:#fff;">管理員登入</div>
        <div style="display:flex;gap:10px;">
            <input id="pwInput" type="password" placeholder="輸入管理密碼" 
                   style="flex:1;padding:12px;border-radius:12px;border:none;background:rgba(255,255,255,0.1);color:white;" 
                   onkeydown="if(event.key==='Enter')doLogin()">
            <button onclick="doLogin()" style="padding:0 24px;border-radius:12px;background:#3b82f6;color:white;border:none;font-weight:600;">確認</button>
        </div>
        <div id="loginErr" style="color:#f87171;font-size:13px;margin-top:10px;display:none;">密碼錯誤，請重試</div>
    </div>

    <div class="admin-banner" id="adminBanner" style="display:none">
        <span>✏️ 管理模式 - 點擊時段調整剩餘面數</span>
        <button onclick="logout()" style="background:none;border:none;color:#f59e0b;font-weight:600;">退出</button>
    </div>

    <div class="venue-tabs" id="venueTabs"></div>

    <div style="padding:18px 20px 12px;">
        <div class="venue-name" id="venueName"></div>
        <div id="venueBadges"></div>
    </div>

    <div class="day-tabs" id="dayTabs"></div>

    <div class="stats">
        <div class="stat"><div class="stat-num" id="sTotal">0</div><div style="font-size:12.5px;color:#94a3b8;">總時段</div></div>
        <div class="stat"><div class="stat-num" id="sFree">0</div><div style="font-size:12.5px;color:#94a3b8;">空閒</div></div>
        <div class="stat" id="sBookedCard"><div class="stat-num" id="sBooked">0</div><div style="font-size:12.5px;color:#94a3b8;">已租</div></div>
    </div>

    <div class="slots" id="slots"></div>

    <div class="footer">
        <p>如需租借請透過 LINE 官方帳號聯繫</p>
    </div>
</div>

<script>
// ==================== 配置 ====================
const ADMIN_PW = "Blue6677";

const DAYS = ["週一","週二","週三","週四","週五","週六","週日"];

const VENUES = [
  { id:0, name:"板橋 江翠國小", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:true, maxCourts:1,
    slots:{0:["18:30–20:30","20:30–22:30","22:30–24:30"],1:["18:30–20:30","20:30–22:30","22:30–24:30"],2:["18:30–20:30","20:30–22:30","22:30–24:30"],3:["18:30–20:30","20:30–22:30","22:30–24:30"],4:["18:30–20:30","20:30–22:30","22:30–24:30"],5:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00","22:00–24:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00","22:00–24:00"]}},
  { id:1, name:"三重 二重國小 1F 羽球場", type:"badminton", courtDesc:"羽球4面", fullCourtOnly:false, maxCourts:4,
    slots:{0:["19:00–21:00","21:00–23:00"],1:["19:00–21:00","21:00–23:00"],2:["19:00–21:00","21:00–23:00"],3:["19:00–21:00","21:00–23:00"],4:["19:00–21:00","21:00–23:00"],5:["12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["09:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:2, name:"三重 二重國小 3F 多功能場館", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:true, maxCourts:1,
    slots:{0:["18:45–20:45","20:45–22:45"],1:["18:45–20:45","20:45–22:45"],2:["18:45–20:45","20:45–22:45"],3:["18:45–20:45","20:45–22:45"],4:["18:45–20:45","20:45–22:45"],5:["12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:3, name:"新莊 裕民國小", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:true, maxCourts:1,
    slots:{0:["18:30–20:30","20:30–22:30"],1:["18:30–20:30","20:30–22:30"],2:["18:30–20:30","20:30–22:30"],3:["18:30–20:30","20:30–22:30"],4:["18:30–20:30","20:30–22:30"],5:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:4, name:"林口 林口國小", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:true, maxCourts:1,
    slots:{0:["19:00–21:00","21:00–23:00"],1:["19:00–21:00","21:00–23:00"],2:["19:00–21:00","21:00–23:00"],3:["19:00–21:00","21:00–23:00"],4:["19:00–21:00","21:00–23:00"],5:["17:00–19:00","19:00–21:00","21:00–23:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:5, name:"樹林 大同國小", type:"multi", courtDesc:"籃球全場 ／ 羽球3面 ／ 匹克球3面", fullCourtOnly:false, maxCourts:3,
    slots:{0:["18:30–20:30","20:30–22:30"],1:["18:30–20:30","20:30–22:30"],2:["18:30–20:30","20:30–22:30"],3:["18:30–20:30","20:30–22:30"],4:["18:30–20:30","20:30–22:30"],5:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:6, name:"林口 麗林國小", type:"badminton", courtDesc:"羽球6面", fullCourtOnly:false, maxCourts:6,
    slots:{0:["19:00–21:00","21:00–23:00"],1:["19:00–21:00","21:00–23:00"],2:["19:00–21:00","21:00–23:00"],3:["19:00–21:00","21:00–23:00"],4:["19:00–21:00","21:00–23:00"],5:["17:00–19:00","19:00–21:00","21:00–23:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:7, name:"林口 頭湖國小", type:"badminton", courtDesc:"羽球6面", fullCourtOnly:false, maxCourts:6,
    slots:{0:["19:00–21:00","21:00–23:00"],1:["19:00–21:00","21:00–23:00"],2:["19:00–21:00","21:00–23:00"],3:["19:00–21:00","21:00–23:00"],4:["19:00–21:00","21:00–23:00"],5:["12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:8, name:"林口 東湖國小", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:false, maxCourts:4,
    slots:{0:["19:00–21:00","21:00–23:00"],1:["19:00–21:00","21:00–23:00"],2:["19:00–21:00","21:00–23:00"],3:["19:00–21:00","21:00–23:00"],4:["19:00–21:00","21:00–23:00"],5:["12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["06:00–08:00","08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:9, name:"林口 新林國小", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:false, maxCourts:4,
    slots:{0:["18:00–20:00","20:00–22:00"],1:["18:00–20:00","20:00–22:00"],2:["18:00–20:00","20:00–22:00"],3:["18:00–20:00","20:00–22:00"],4:["18:00–20:00","20:00–22:00"],5:["06:00–08:00","08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["06:00–08:00","08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}}
];

let venueIdx = 0;
let dayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
let isAdmin = false;
let activeEditor = null;
let state = {};

// localStorage
function loadState() { const saved = localStorage.getItem('venueBookingState'); if(saved) state = JSON.parse(saved); }
function saveState() { localStorage.setItem('venueBookingState', JSON.stringify(state)); }

function getRemaining(si) {
    const v = VENUES[venueIdx];
    const k = `${v.id}-${dayIdx}-${si}`;
    const s = state[k];
    if (v.fullCourtOnly) return s === true ? 0 : 1;
    return s !== undefined ? s : v.maxCourts;
}

// 管理員功能
function handleAdminBtn() {
    if (isAdmin) { logout(); return; }
    document.getElementById('loginPanel').style.display = 'block';
}

function doLogin() {
    if (document.getElementById('pwInput').value === ADMIN_PW) {
        isAdmin = true;
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('adminBanner').style.display = 'flex';
        document.getElementById('adminBtn').textContent = '✓ 管理中';
        renderSlots();
    } else {
        document.getElementById('loginErr').style.display = 'block';
    }
}

function logout() {
    isAdmin = false; activeEditor = null;
    document.getElementById('adminBanner').style.display = 'none';
    document.getElementById('adminBtn').textContent = '管理員';
    renderSlots();
}

// 渲染函數
function renderVenueTabs() {
    document.getElementById('venueTabs').innerHTML = VENUES.map((v,i) => 
        `<button class="venue-tab${i===venueIdx?' active':''}" onclick="switchVenue(${i})">${v.name.split(' ')[0]}</button>`
    ).join('');
}

function renderVenueInfo() {
    const v = VENUES[venueIdx];
    document.getElementById('venueName').textContent = v.name;
    let badges = `<span class="badge" style="background:rgba(59,130,246,0.2);color:#60a5fa;">${v.courtDesc}</span>`;
    if (v.fullCourtOnly) badges += `<span class="badge" style="background:rgba(249,115,22,0.2);color:#fb923c;">⚠️ 全場租借為主</span>`;
    document.getElementById('venueBadges').innerHTML = badges;
}

function renderDayTabs() {
    const today = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
    document.getElementById('dayTabs').innerHTML = DAYS.map((d,i) => {
        const active = i===dayIdx ? ' active' : '';
        return `<button class="day-tab${active}" onclick="switchDay(${i})">${d}</button>`;
    }).join('');
}

function renderSlots() {
    const v = VENUES[venueIdx];
    const slots = v.slots[dayIdx] || [];
    let free = 0, booked = 0;
    slots.forEach((_,si) => getRemaining(si) === 0 ? booked++ : free++);

    document.getElementById('sTotal').textContent = slots.length;
    document.getElementById('sFree').textContent = free;
    document.getElementById('sBooked').textContent = booked;

    const container = document.getElementById('slots');
    container.innerHTML = slots.map((slot, si) => {
        const rem = getRemaining(si);
        const max = v.fullCourtOnly ? 1 : v.maxCourts;
        const fullyBooked = rem === 0;
        const clickable = isAdmin ? ' clickable' : '';

        let badge = fullyBooked ? '已全租' : v.fullCourtOnly ? '可租' : `剩餘 ${rem}/${max} 面`;

        let pips = !v.fullCourtOnly ? Array.from({length: max}, (_,i) => 
            `<div class="cpip" style="background:${i<rem?'#4ade80':'#475569'};color:${i<rem?'#052e16':'#e2e8f0'};">${i+1}</div>`
        ).join('') : '';

        let editor = '';
        if (isAdmin && activeEditor === si && !v.fullCourtOnly) {
            editor = `<div class="court-editor">設定剩餘面數：<br>`;
            for (let i = max; i >= 0; i--) {
                const isActive = rem === i ? 'background:#3b82f6;color:white;' : '';
                const text = i === 0 ? '全部租出' : `剩餘 ${i} 面`;
                editor += `<button class="ce-btn" style="${isActive}" onclick="setRemaining(${si},${i});event.stopImmediatePropagation()">${text}</button>`;
            }
            editor += '</div>';
        }

        return `
        <div class="slot-card ${fullyBooked ? 's-booked' : ''}${clickable}" onclick="handleSlotClick(${si})">
            <div class="slot-main">
                <div class="slot-time">${slot}</div>
                <span class="slot-badge" style="background:${fullyBooked?'#b91c1c':'#22c55e'};color:white;">${badge}</span>
            </div>
            ${pips ? `<div class="court-row">面數狀況：<div style="display:flex;gap:6px;">${pips}</div></div>` : ''}
            ${editor}
        </div>`;
    }).join('');
}

function handleSlotClick(si) {
    if (!isAdmin) return;
    const v = VENUES[venueIdx];
    if (v.fullCourtOnly) {
        const k = `${v.id}-${dayIdx}-${si}`;
        state[k] = !state[k];
    } else {
        activeEditor = activeEditor === si ? null : si;
    }
    saveState();
    renderSlots();
}

function setRemaining(si, count) {
    const k = `${VENUES[venueIdx].id}-${dayIdx}-${si}`;
    state[k] = count;
    activeEditor = null;
    saveState();
    renderSlots();
}

function switchVenue(i) { venueIdx = i; activeEditor = null; renderVenueTabs(); renderVenueInfo(); renderSlots(); }
function switchDay(i) { dayIdx = i; activeEditor = null; renderDayTabs(); renderSlots(); }

// 初始化
loadState();
renderVenueTabs();
renderVenueInfo();
renderDayTabs();
renderSlots();
</script>
</body>
</html>
