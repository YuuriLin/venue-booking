// ==================== 深層連結支援 ====================
function getVenueFromURL() {
    const params = new URLSearchParams(window.location.search);
    const venueParam = params.get('venue');
    if (venueParam !== null) {
        const id = parseInt(venueParam);
        const index = VENUES.findIndex(v => v.id === id);
        if (index !== -1) venueIdx = index;
    }
}

function loadState() { const saved = localStorage.getItem('venueBookingState'); if(saved) state = JSON.parse(saved); }
function saveState() { localStorage.setItem('venueBookingState', JSON.stringify(state)); }

function getRemaining(si) {
    const v = VENUES[venueIdx];
    const k = `${v.id}-${dayIdx}-${si}`;
    const s = state[k];
    if (v.fullCourtOnly) return s === true ? 0 : 1;

    if (v.dayMaxCourts && v.dayMaxCourts[dayIdx] !== undefined) {
        max = v.dayMaxCourts[dayIdx];
    }
    return s !== undefined ? Math.min(s, max) : max;
}
