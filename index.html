    slots:{0:["18:30–20:30","20:30–22:30"],1:["18:30–20:30","20:30–22:30"],2:["18:30–20:30","20:30–22:30"],3:["18:30–20:30","20:30–22:30"],4:["18:30–20:30","20:30–22:30"],5:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},

  { id:9, name:"林口 東湖國小", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:false, maxCourts:4,
    slots:{0:["19:00–21:00","21:00–23:00"],1:["19:00–21:00","21:00–23:00"],2:["19:00–21:00","21:00–23:00"],3:["19:00–21:00","21:00–23:00"],4:["19:00–21:00","21:00–23:00"],5:["12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["06:00–08:00","08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}},
  { id:10, name:"林口 新林國小", type:"multi", courtDesc:"籃球全場 ／ 羽球4面 ／ 匹克球4面", fullCourtOnly:false, maxCourts:4,
    slots:{0:["18:00–20:00","20:00–22:00"],1:["18:00–20:00","20:00–22:00"],2:["18:00–20:00","20:00–22:00"],3:["18:00–20:00","20:00–22:00"],4:["18:00–20:00","20:00–22:00"],5:["06:00–08:00","08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"],6:["06:00–08:00","08:00–10:00","10:00–12:00","12:00–14:00","14:00–16:00","16:00–18:00","18:00–20:00","20:00–22:00"]}}
];

let venueIdx = 0;
let dayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
let isAdmin = false;
let activeEditor = null;
let state = {};

// ==================== URL 支援 ====================
function getVenueFromURL() {
  const params = new URLSearchParams(window.location.search);
  const venueParam = params.get('venue');
  if (venueParam !== null) {
    const id = parseInt(venueParam);
    const index = VENUES.findIndex(v => v.id === id);
    if (index !== -1) venueIdx = index;
  }
}

// ==================== Firebase 狀態管理 ====================
function saveState() {
  stateRef.set(state);
}

// 即時監聽雲端 → 所有裝置自動同步
stateRef.on('value', (snapshot) => {
  state = snapshot.val() || {};
  renderAll();
  document.getElementById('loadingOverlay').style.display = 'none';
});

// ==================== 場地邏輯 ====================
function isFullCourtMode() {
  const v = VENUES[venueIdx];
  if (v.fullCourtOnly) return true;
  if (v.id === 4 && dayIdx !== 6) return true;
  if (v.id === 2 && dayIdx !== 2 && dayIdx !== 6) return true;
  return false;
}

function getMaxCourts() {
  if (isFullCourtMode()) return 1;
  const v = VENUES[venueIdx];
  if (v.dayMaxCourts && v.dayMaxCourts[dayIdx] !== undefined) return v.dayMaxCourts[dayIdx];
  return v.maxCourts || 1;
}

function getRemaining(si) {
  const v = VENUES[venueIdx];
  const k = `${v.id}-${dayIdx}-${si}`;
  const s = state[k];
  return s !== undefined ? s : getMaxCourts();
}

// ==================== 管理員功能 ====================
function handleAdminBtn() {
  if (isAdmin) { logout(); return; }
  document.getElementById('loginPanel').style.display = 'block';
}

function doLogin() {
  if (document.getElementById('pwInput').value === ADMIN_PW) {
    isAdmin = true;
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminBanner').style.display = 'flex';
    document.getElementById('adminBtn').textContent = '✓ 管理中';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginErr').style.display = 'none';
    renderSlots();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  isAdmin = false; activeEditor = null;
  document.getElementById('adminBanner').style.display = 'none';
  document.getElementById('adminBtn').textContent = '管理員';
  renderSlots();
}

function setRemaining(si, val) {
  const v = VENUES[venueIdx];
  const k = `${v.id}-${dayIdx}-${si}`;
  state[k] = val;
  saveState();
}

// ==================== 渲染 ====================
function renderAll() {
  renderVenueTabs();
  renderVenueInfo();
  renderDayTabs();
  renderSlots();
}

function renderVenueTabs() {
  document.getElementById('venueTabs').innerHTML = VENUES.map((v, i) =>
    `<button class="venue-tab${i === venueIdx ? ' active' : ''}" onclick="switchVenue(${i})">${v.name}</button>`
  ).join('');
}

function renderVenueInfo() {
  const v = VENUES[venueIdx];
  document.getElementById('venueName').textContent = v.name;
  let html = `<span class="badge" style="background:#dbeafe;color:#1e40af;">${v.courtDesc}</span>`;
  if (isFullCourtMode()) html += `<span class="badge" style="background:#fef3c7;color:#92400e;">⚠️ 全場租借為主</span>`;
  document.getElementById('venueBadges').innerHTML = html;
}

function renderDayTabs() {
  document.getElementById('dayTabs').innerHTML = DAYS.map((d, i) =>
    `<button class="day-tab${i === dayIdx ? ' active' : ''}" onclick="switchDay(${i})">${d}</button>`
  ).join('');
}

function renderSlots() {
  const v = VENUES[venueIdx];
  const slots = v.slots[dayIdx] || [];
  const isFullMode = isFullCourtMode();
  const max = getMaxCourts();

  let total = slots.length, free = 0, booked = 0;
  slots.forEach((_, si) => { getRemaining(si) === 0 ? booked++ : free++; });
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sFree').textContent = free;
  document.getElementById('sBooked').textContent = booked;

  const container = document.getElementById('slots');
  if (!slots.length) {
    container.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">此日無開放時段</p>';
    return;
  }

  container.innerHTML = slots.map((slot, si) => {
    const rem = getRemaining(si);
    const fullyBooked = rem === 0;
    const clickable = isAdmin ? ' clickable' : '';

    let badge;
    if (fullyBooked) {
      badge = '已全租';
    } else if (isFullMode) {
      badge = '可租';
    } else if (v.id === 2 && dayIdx === 2) {
      badge = rem === max ? `剩餘半場 (${rem}面)` : `剩餘 ${rem}/${max} 面`;
    } else {
      badge = rem === max ? `剩餘全場 (${max}面)` : `剩餘 ${rem}/${max} 面`;
    }

    const pips = (!isFullMode && max > 1)
      ? Array.from({ length: max }, (_, j) =>
          `<div class="cpip" style="background:${j < rem ? '#22d3ee' : '#e2e8f0'};color:${j < rem ? '#164e63' : '#64748b'};">${j + 1}</div>`
        ).join('')
      : '';

    let editor = '';
    if (isAdmin && activeEditor === si) {
      editor = `<div class="court-editor">設定狀態：<br>`;
      if (isFullMode) {
        editor += `<button class="ce-btn" style="${rem > 0 ? 'background:#1e40af;color:white;' : ''}" onclick="setRemaining(${si},1)">全場可租</button>`;
        editor += `<button class="ce-btn" style="${rem === 0 ? 'background:#1e40af;color:white;' : ''}" onclick="setRemaining(${si},0)">全部租出</button>`;
      } else {
        for (let i = max; i >= 0; i--) {
          const active = rem === i ? 'background:#1e40af;color:white;' : '';
          const text = i === 0 ? '全部租出' : `剩餘 ${i} 面`;
          editor += `<button class="ce-btn" style="${active}" onclick="setRemaining(${si},${i})">${text}</button>`;
        }
      }
      editor += `</div>`;
    }

    return `
      <div class="slot-card${fullyBooked ? ' s-booked' : ''}${clickable}" onclick="handleSlotClick(${si})">
        <div class="slot-main">
          <div class="slot-time">${slot}</div>
          <span style="background:${fullyBooked ? '#ef4444' : '#22c55e'};color:white;padding:8px 16px;border-radius:9999px;font-weight:600;">${badge}</span>
        </div>
        ${pips ? `<div class="court-row">面數：<div style="display:flex;gap:6px;">${pips}</div></div>` : ''}
        ${editor}
      </div>`;
  }).join('');
}

// ==================== 互動 ====================
function handleSlotClick(si) {
  if (!isAdmin) return;
  activeEditor = activeEditor === si ? null : si;
  renderSlots();
}

function switchVenue(i) {
  venueIdx = i; activeEditor = null;
  renderVenueTabs(); renderVenueInfo(); renderDayTabs(); renderSlots();
  history.replaceState(null, '', `?venue=${VENUES[i].id}`);
}

function switchDay(i) {
  dayIdx = i; activeEditor = null;
  renderDayTabs(); renderVenueInfo(); renderSlots();
}

// ==================== 初始化 ====================
getVenueFromURL();
// Firebase onValue 監聽器會自動載入資料並觸發渲染
</script>
</body>
</html>
